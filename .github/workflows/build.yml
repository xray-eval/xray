# Production bundle verification.
#
# Fails the PR when `pnpm build` no longer succeeds (or starts emitting CSS
# `invalid @ rule` warnings — the Tailwind plugin must keep loading). Plain
# typecheck + tests don't catch this: bundling is its own surface (HTML
# entrypoint resolution, CSS plugin pipeline, define-replacement, asset
# emission) and historically broke when bunfig.toml's plugin list was wrong
# for the build CLI.
#
# Local equivalent: `pnpm build` (artifacts land in dist/).

name: Build

on:
  pull_request:
  push:
    branches: [main]

permissions: {}

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: pnpm build
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5  # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node (pinned via .nvmrc)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version-file: '.nvmrc'

      # Pinned via .tool-versions (single source of truth for local dev,
      # Docker, and CI). `Bun.build` from scripts/build.ts is the entrypoint.
      - name: Setup Bun (pinned via .tool-versions)
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2.2.0
        with:
          bun-version-file: '.tool-versions'

      # Corepack must run AFTER setup-node — same reasoning as test.yml.
      - name: Activate the pinned pnpm version via corepack
        run: |
          corepack enable
          corepack prepare --activate
          pnpm --version

      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Build the SPA
        # `2>&1 | tee build.log` so the warning-grep step below can read the
        # output without re-running the build. `set -o pipefail` makes the
        # step fail if `bun build` exits non-zero (default behavior for the
        # bash shell GitHub uses — explicit for clarity).
        shell: bash
        run: |
          set -o pipefail
          pnpm build 2>&1 | tee build.log

      # CSS warnings (`invalid @ rule`) come from Bun's CSS parser when the
      # Tailwind plugin isn't loaded for the build path. They don't fail
      # `bun build` on their own, so guard explicitly — if these reappear the
      # CSS bundle is silently broken (missing `@theme`, `@utility`, etc.).
      - name: Fail on Tailwind/CSS @-rule warnings
        run: |
          if grep -E 'invalid @ rule' build.log; then
            echo "::error::CSS plugin isn't processing Tailwind directives — check scripts/build.ts and bunfig.toml."
            exit 1
          fi

      - name: Verify expected bundle artifacts
        # Smoke check: index.html + at least one .js and one .css chunk.
        # Catches the "build silently emitted nothing" mode.
        run: |
          test -f dist/index.html || { echo "::error::dist/index.html missing"; exit 1; }
          ls dist/*.js > /dev/null || { echo "::error::no JS chunk emitted"; exit 1; }
          ls dist/*.css > /dev/null || { echo "::error::no CSS chunk emitted"; exit 1; }
          ls -la dist/

      - name: Upload dist as artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v6.0.0
        with:
          name: dist
          path: dist/
          retention-days: 7
          if-no-files-found: error

  smoke:
    # Build the production Docker image, run it, wait for HEALTHCHECK.
    # Same `pnpm docker:smoke` developers run locally (CLAUDE.md "Local-first").
    # Catches regressions like the unmounted-default `/data` permission bug
    # that `pnpm build` alone can't see — bundling succeeds, container boot
    # is its own surface.
    name: pnpm docker:smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5  # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node (pinned via .nvmrc)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version-file: '.nvmrc'

      # pnpm is only needed to invoke the `docker:smoke` script via the same
      # command developers run locally. The script itself shells out to docker;
      # nothing inside the host needs node_modules.
      - name: Activate the pinned pnpm version via corepack
        run: |
          corepack enable
          corepack prepare --activate
          pnpm --version

      - name: Build + run + healthcheck
        run: pnpm docker:smoke
