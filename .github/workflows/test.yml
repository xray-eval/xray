# Test + coverage gate — see .claude/rules/tdd.md "Coverage gates".
#
# Fails the build when:
#   - any test fails
#   - line / branch / function coverage drops below the thresholds in
#     vitest.config.ts (non-store code) or bunfig.toml (store slice)
#
# Pre-commit hooks already run lint + typecheck + gitleaks; this workflow is
# the *test* layer specifically. Local equivalent: `pnpm test:coverage`.

name: Test

# Two test runners — see vitest.config.ts and bunfig.toml:
#   - vitest under Node for everything except the SQLite store slice
#   - `bun test` for `src/server/store/**` (it imports `bun:sqlite`, which
#     Node can't resolve and which Vite refuses to bundle)
# CI installs both runtimes; both gates must pass.

on:
  pull_request:
  push:
    branches: [main]

permissions: {}

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Vitest + bun test + coverage
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write  # coverage summary comment (future)

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5  # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node (pinned via .nvmrc)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version-file: '.nvmrc'

      # Pinned via .tool-versions (single source of truth for local dev,
      # Docker, and CI). Needed by `pnpm test:store` — see header comment.
      - name: Setup Bun (pinned via .tool-versions)
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2.2.0
        with:
          bun-version-file: '.tool-versions'

      # Corepack must run AFTER setup-node: current pnpm (11.x) requires
      # Node ≥22.13, and the runner's pre-installed Node is older than that.
      # package.json#packageManager is the source of truth for the pnpm
      # version corepack activates.
      - name: Activate the pinned pnpm version via corepack
        run: |
          corepack enable
          corepack prepare --activate
          pnpm --version

      # Cache the pnpm content-addressed store. `cache: 'pnpm'` on setup-node
      # can't be used here because it needs pnpm on PATH when setup-node runs,
      # and pnpm only becomes available after corepack (above) — which itself
      # needs the pinned Node first.
      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        # vitest.config.ts thresholds (lines / branches / functions / statements)
        # fail the step automatically — no extra gate needed here.
        run: pnpm test:coverage

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v6.0.0
        with:
          name: coverage
          path: coverage/
          retention-days: 14
          if-no-files-found: warn
