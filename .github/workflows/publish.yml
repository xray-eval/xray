# Publish workflow — builds the Docker image and pushes to GHCR on tag push.
# See .claude/rules/supply-chain.md "What's not yet covered" for the design.
#
# Triggered ONLY by `v*` tags. Never on push to main, never on workflow_dispatch.
# A release is an explicit `git tag v0.1.0 && git push --tags` action.
#
# Every action is pinned to a 40-char commit SHA (supply-chain.md §4).
# Base image digests live in the Dockerfile (same rule).

name: Publish

on:
  push:
    tags:
      - "v*.*.*"

# Default-deny — each job re-grants the minimum.
permissions: {}

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false  # never cancel a publish in flight

jobs:
  publish:
    name: Build, push, sign, attest
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read         # checkout
      packages: write        # push to ghcr.io
      id-token: write        # OIDC for cosign keyless + provenance attestation
      attestations: write    # actions/attest-build-provenance writes here

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}  # ghcr.io/<owner>/<repo>

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5  # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Set up QEMU (multi-arch builds)
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a  # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - name: Log in to GHCR
        # GITHUB_TOKEN is short-lived and scoped to this workflow — no static PAT.
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags + labels
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
          labels: |
            org.opencontainers.image.title=Voice Agent X-Ray
            org.opencontainers.image.description=Open-source self-hosted debugger for voice-agent workflows.
            org.opencontainers.image.licenses=Elastic-2.0

      - name: Build + push (multi-arch)
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Provenance + SBOM attestations are attached below (separate steps,
          # using GitHub's first-party attest-* actions).
          provenance: false
          sbom: false

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Sign the image (cosign keyless via OIDC)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          # `cosign sign` over the digest pins us to the exact image bytes that
          # were just pushed — tag mutability is irrelevant.
          for tag in $TAGS; do
            cosign sign --yes "${tag}@${DIGEST}"
          done

      - name: Attest build provenance (SLSA)
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Generate SBOM (Syft, SPDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Attest SBOM
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e  # v4.1.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          sbom-path: sbom.spdx.json
          push-to-registry: true
