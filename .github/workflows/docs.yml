# Docs site — build the VitePress docs and deploy to GitHub Pages.
# Replaces the old GitHub-managed Jekyll build (docs/_config.yml, removed).
#
# Deploy happens on a release tag (v*.*.*), mirroring publish.yml — docs are cut
# alongside the Docker image. Pull requests that touch the docs get a build-only
# check (no deploy) so a broken docs build can't merge. workflow_dispatch is a
# deliberate escape hatch — re-publish (or first-publish, before the next tag)
# without cutting a release; this is the documented reason for the trigger per
# .claude/rules/supply-chain.md §2.
#
# One-time setup: repo Settings → Pages → Source = "GitHub Actions".
# Local equivalent: `pnpm docs:build` (and `pnpm docs:dev` for a live preview).

name: Docs

on:
  push:
    tags:
      - "v*.*.*"
  pull_request:
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
      - "pnpm-lock.yaml"
      - "package.json"
  workflow_dispatch:

permissions: {}

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: false # never cancel an in-flight Pages deploy (mirrors publish.yml)

jobs:
  build:
    name: vitepress build
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node (pinned via .nvmrc)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"

      # Corepack must run AFTER setup-node — current pnpm (11.x) needs Node ≥22.13,
      # newer than the runner's pre-installed Node. package.json#packageManager is
      # the source of truth for the pnpm version corepack activates.
      - name: Activate the pinned pnpm version via corepack
        run: |
          corepack enable
          corepack prepare --activate
          pnpm --version

      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      # Runs on every PR as a compile-only gate; on tag/dispatch it also feeds the
      # artifact below. Base path (/xray/) is hardcoded in docs/.vitepress/config.mts.
      - name: Build docs
        run: pnpm docs:build

      # Pages steps run only when we actually deploy (tag push or manual dispatch).
      - name: Upload Pages artifact
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs/.vitepress/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      pages: write # deploy to the Pages service
      id-token: write # OIDC token the deploy-pages action verifies
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
