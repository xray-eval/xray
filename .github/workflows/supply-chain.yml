# Supply-chain audit — see .claude/rules/supply-chain.md (section 2).
# Runs on every PR and every push to main. Don't add `workflow_dispatch`
# without thinking about who can manually trigger and skip checks.

name: Supply chain

on:
  pull_request:
  push:
    branches: [main]

# Default-deny — each job re-grants only what it needs.
permissions: {}

concurrency:
  group: supply-chain-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: Supply-chain audit
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write  # dependency-review-action comments on PRs

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5  # v2.19.3
        with:
          # Start in audit mode to learn the egress profile, then flip to `block`
          # with an allowed-endpoints list once stable.
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node (pinned via .nvmrc)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          # Single source of truth: .nvmrc (mirrored from .tool-versions).
          # Floating major like '22' would silently take a new patch on each
          # run — exactly the dependency-injection vector we're closing.
          node-version-file: '.nvmrc'

      # Corepack must run AFTER setup-node: current pnpm (11.x) requires
      # Node ≥22.13, and the runner's pre-installed Node is older than that.
      # package.json#packageManager is the source of truth for the pnpm
      # version corepack activates.
      - name: Activate the pinned pnpm version via corepack
        run: |
          corepack enable
          corepack prepare --activate
          pnpm --version

      # Cache the pnpm content-addressed store. `cache: 'pnpm'` on setup-node
      # can't be used here because it needs pnpm on PATH when setup-node runs,
      # and pnpm only becomes available after corepack (above) — which itself
      # needs the pinned Node first.
      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Frozen-lockfile install
        # --frozen-lockfile fails if pnpm-lock.yaml is out of sync with package.json.
        # It also enforces every security setting in pnpm-workspace.yaml:
        # minimumReleaseAge, allowBuilds (deny), blockExoticSubdeps, trustPolicy, etc.
        run: pnpm install --frozen-lockfile

      - name: Audit known vulnerabilities (fail on moderate+)
        run: pnpm audit --audit-level=moderate

      - name: Reject exotic or non-registry resolutions in the lockfile
        # blockExoticSubdeps already prevents this at install time; this is a
        # belt-and-braces check on the *committed* lockfile so a future config
        # relaxation can't sneak in a tarball/git resolution unnoticed.
        run: |
          set -euo pipefail
          if [ ! -f pnpm-lock.yaml ]; then
            echo "::error::pnpm-lock.yaml missing — every commit must include it"
            exit 1
          fi
          if grep -nE '^\s*resolution:\s*\{\s*(tarball|repo|directory):' pnpm-lock.yaml; then
            echo "::error::Lockfile contains exotic resolutions (tarball/repo/directory)"
            exit 1
          fi
          if grep -nE '^\s*registry:\s*' pnpm-lock.yaml | grep -vE 'registry\.npmjs\.org'; then
            echo "::error::Lockfile references a non-npmjs registry"
            exit 1
          fi

      - name: Dependency review (PR only — fails on new vulnerable / disallowed-license deps)
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294  # v5.0.0
        with:
          fail-on-severity: moderate
          # ELv2-redistributable bundle: reject every copyleft family on any
          # new prod dep. The SPA is built with Bun's HTML bundler, which
          # inlines JS into single output chunks — so even weak-copyleft
          # licenses (LGPL §6, MPL §3.3, EPL §3) would trigger
          # source-availability obligations on the bundle itself. SPDX
          # expressions must be enumerated explicitly; the action does not
          # glob. This is the single source of truth — NOTICE and LICENSE
          # reference this list rather than restating it.
          deny-licenses: >-
            GPL-1.0, GPL-1.0-only, GPL-1.0-or-later,
            GPL-2.0, GPL-2.0-only, GPL-2.0-or-later,
            GPL-3.0, GPL-3.0-only, GPL-3.0-or-later,
            LGPL-2.0, LGPL-2.0-only, LGPL-2.0-or-later,
            LGPL-2.1, LGPL-2.1-only, LGPL-2.1-or-later,
            LGPL-3.0, LGPL-3.0-only, LGPL-3.0-or-later,
            AGPL-1.0, AGPL-1.0-only, AGPL-1.0-or-later,
            AGPL-3.0, AGPL-3.0-only, AGPL-3.0-or-later,
            SSPL-1.0,
            MPL-1.0, MPL-1.1, MPL-2.0,
            EPL-1.0, EPL-2.0,
            CDDL-1.0, CDDL-1.1,
            EUPL-1.0, EUPL-1.1, EUPL-1.2,
            CC-BY-SA-1.0, CC-BY-SA-2.0, CC-BY-SA-2.5,
            CC-BY-SA-3.0, CC-BY-SA-4.0
          comment-summary-in-pr: on-failure
