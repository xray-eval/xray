# Secret-leak scan — see .claude/rules/public-repo.md §4.
#
# This is a *merge gate*, not a leak-prevention mechanism. The leak happens
# the instant a blob hits GitHub; this job stops the PR from being merged but
# does NOT undo the leak. The load-bearing controls are upstream:
#   - Pre-commit gitleaks hook (lefthook.yml)
#   - GitHub Push Protection (Settings → Code security → enable on first push)
#
# This workflow exists because Push Protection cannot enforce on PRs from
# forks — we don't admin the fork. CI on `pull_request` is where we catch a
# secret a contributor pushed to their own fork before opening a PR.

name: Secret scan

on:
  pull_request:
  push:
    branches: [main]

permissions: {}

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read

    env:
      # Pin gitleaks version + sha256 of the linux x64 release tarball.
      # Bump together — never relax the sha check.
      GITLEAKS_VERSION: "8.30.1"
      GITLEAKS_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5  # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          # Need full history for the diff-scan on `push`. PR scans only need
          # the diff between base and head, which checkout fetches by default.
          fetch-depth: 0
          persist-credentials: false

      - name: Install gitleaks (pinned, sha256-verified)
        run: |
          set -euo pipefail
          tarball="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${tarball}"
          curl -fsSL --proto '=https' --tlsv1.2 -o "$tarball" "$url"
          echo "${GITLEAKS_SHA256}  ${tarball}" | sha256sum -c -
          tar -xzf "$tarball" gitleaks
          install -m 0755 gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan
        # NEVER interpolate `${{ ... }}` directly into a `run:` script —
        # always route through `env:` so an attacker-influenced ref can't
        # break out of the shell argument. (Defense-in-depth; SHAs are
        # normally hex-only, but the hardening rule is universal.)
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "pull_request" ]; then
            # Scan only the PR's diff against its base — fast, and exactly the
            # set of commits this PR introduces.
            gitleaks detect \
              --no-banner \
              --redact \
              --log-opts="--no-merges ${BASE_SHA}..${HEAD_SHA}"
          else
            # On push to main, scan the full history each time. Cheap (gitleaks
            # is fast) and catches anything that slipped in via a path other
            # than a PR (e.g. direct push during early bootstrap).
            gitleaks detect --no-banner --redact
          fi
