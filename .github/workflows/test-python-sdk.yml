# Python SDK test gate — ruff + pyright (strict) + pytest.
#
# Path-filtered to sdk/python/** so PRs that don't touch the SDK skip it.
# Local equivalent (from sdk/python/), using uv:
#
#     uv venv --python 3.12.7
#     source .venv/bin/activate
#     uv pip install -e .[dev]
#     ruff check src tests
#     ruff format --check src tests
#     pyright src tests
#     pytest -v
#
# The strict-mode gate lives in sdk/python/pyproject.toml `[tool.pyright]`;
# CI just runs the binary. Type policy is documented at
# sdk/python/.claude/rules/no-any.md / assert-never.md / typed-boundaries.md.
#
# DO NOT add this check to GitHub branch protection's "required status
# checks" without also adding a path-ignored skip job: workflows with
# `paths:` filters never report status on PRs that don't match, so a
# required check would hang non-SDK PRs forever waiting on a job that
# never queues.

name: Python SDK

on:
  pull_request:
    paths:
      - 'sdk/python/**'
      - '.python-version'
      - '.tool-versions'
      - '.github/workflows/test-python-sdk.yml'
  push:
    branches: [main]
    paths:
      - 'sdk/python/**'
      - '.python-version'
      - '.tool-versions'
      - '.github/workflows/test-python-sdk.yml'

permissions: {}

concurrency:
  group: test-python-sdk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ruff + pyright + pytest
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5  # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      # `.python-version` is the single source of truth (pyenv format).
      # `.tool-versions` carries the same pin for mise/asdf parity.
      # setup-uv reads `.python-version` automatically and caches the
      # resolved interpreter + wheel set across runs.
      - name: Setup uv (pinned via SHA)
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          python-version-file: '.python-version'
          # Re-key the wheel cache when the dep set changes. uv reads
          # pyproject.toml directly; no separate lockfile yet.
          cache-dependency-glob: 'sdk/python/pyproject.toml'
          enable-cache: true

      # `[livekit]` is intentionally omitted: `_load_livekit` uses
      # `importlib.import_module` + a `@runtime_checkable` Protocol
      # isinstance, so the static check doesn't need the package
      # installed. Saves ~60s of livekit + livekit-api download per run.
      #
      # `--system` would target Ubuntu 24.04's PEP 668-protected system
      # Python and fail. Create a uv-managed venv and invoke the tools
      # via `.venv/bin/<tool>` — same flow as the local instructions
      # above.
      - name: Create venv + install SDK + dev extras
        working-directory: sdk/python
        run: |
          uv venv --python "$(cat ../../.python-version)"
          uv pip install -e '.[dev]'

      - name: ruff (lint + format check)
        working-directory: sdk/python
        run: |
          .venv/bin/ruff check src tests
          .venv/bin/ruff format --check src tests

      # Strict mode is configured in sdk/python/pyproject.toml.
      - name: pyright (strict)
        working-directory: sdk/python
        run: .venv/bin/pyright src tests

      - name: pytest
        working-directory: sdk/python
        run: .venv/bin/pytest -v
