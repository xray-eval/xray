# Supply-chain hardening — see .claude/rules/supply-chain.md (section 1).
# Do NOT relax these without reading that rule first.

# Refuse to resolve packages younger than 7 days (10080 minutes).
# Catches the high-risk window right after a maintainer-account compromise.
minimumReleaseAge: 10080
# Fail loudly when a target version is too new — never silently downgrade.
minimumReleaseAgeStrict: true

# Default-deny lifecycle scripts. Audit before adding entries here.
allowBuilds:
  # lefthook (Evil Martians) — postinstall fetches the prebuilt Go binary from
  # the lefthook GitHub release matching the package version. Required for the
  # git hooks to function. Audited 2026-05-16 against npm pkg @ v2.1.6.
  lefthook: true
  # msw — postinstall is a no-op unless `msw.workerDirectory` is set in our
  # package.json (it isn't; we're Node-only, no browser service worker). The
  # script wraps its body in `.catch(() => void 0)`. Audited 2026-05-16 against
  # `node_modules/msw/config/scripts/postinstall.js` @ v2.14.5.
  msw: true
  # esbuild — pulled in transitively by `drizzle-kit` (dev-dep for migration
  # generation). The postinstall script selects the platform-specific binary
  # subpackage (e.g. @esbuild/linux-x64) — a regular npm package pnpm has
  # already resolved with cooldown rules — and falls back to downloading the
  # tarball from registry.npmjs.org over HTTPS if the optional dep was skipped.
  # Both paths source from the same registry pnpm already trusts. esbuild has
  # provenance attestation + Sigstore signature. Audited 2026-05-16 against
  # `node_modules/esbuild/install.js` @ v0.27.7.
  esbuild: true

# Reinforce the v11 default in case it ever changes upstream.
strictDepBuilds: true

# No transitive deps from git URLs or raw tarballs — registry only.
blockExoticSubdeps: true

# Fail install if a newer release has weaker publish-time trust than the prior one.
trustPolicy: no-downgrade

# Re-verify node_modules matches the lockfile before any script runs.
verifyDepsBeforeRun: install

# Transitive-dep overrides. Each entry needs a date + reason — same bar as
# `allowBuilds` above. Keep the path as specific as possible so the override
# disappears the moment drizzle-kit (or the upstream chain) is fixed.
overrides:
  # GHSA-67mh-4wv8-2f99 — esbuild <=0.24.2 lets any website hit the dev server
  # via permissive CORS. drizzle-kit ships the deprecated `@esbuild-kit/*`
  # packages which pin esbuild 0.18.20. We only invoke drizzle-kit for
  # `db:generate` / `db:studio` (no dev-server exposure), so the practical risk
  # is nil — but `pnpm audit --audit-level=moderate` (supply-chain CI job)
  # rejects it. Pinning ^0.25.0 lines up with the already-resolved esbuild
  # 0.25.12 elsewhere in the tree, so this adds zero new versions. Remove this
  # entry once drizzle-kit drops `@esbuild-kit/*` for `tsx`. Added 2026-05-16.
  "@esbuild-kit/core-utils>esbuild": "^0.25.0"
