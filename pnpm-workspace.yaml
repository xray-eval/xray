# Supply-chain hardening — see .claude/rules/supply-chain.md (section 1).
# Do NOT relax these without reading that rule first.

# Refuse to resolve packages younger than 7 days (10080 minutes).
# Catches the high-risk window right after a maintainer-account compromise.
minimumReleaseAge: 10080
# Fail loudly when a target version is too new — never silently downgrade.
minimumReleaseAgeStrict: true

# Default-deny lifecycle scripts. Audit before adding entries here.
allowBuilds:
  # lefthook (Evil Martians) — postinstall fetches the prebuilt Go binary from
  # the lefthook GitHub release matching the package version. Required for the
  # git hooks to function. Audited 2026-05-16 against npm pkg @ v2.1.6.
  lefthook: true
  # msw — postinstall is a no-op unless `msw.workerDirectory` is set in our
  # package.json (it isn't; we're Node-only, no browser service worker). The
  # script wraps its body in `.catch(() => void 0)`. Audited 2026-05-16 against
  # `node_modules/msw/config/scripts/postinstall.js` @ v2.14.5.
  msw: true
  # esbuild — pulled in transitively by `drizzle-kit` (dev-dep for migration
  # generation). The postinstall script selects the platform-specific binary
  # subpackage (e.g. @esbuild/linux-x64) — a regular npm package pnpm has
  # already resolved with cooldown rules — and falls back to downloading the
  # tarball from registry.npmjs.org over HTTPS if the optional dep was skipped.
  # Both paths source from the same registry pnpm already trusts. esbuild has
  # provenance attestation + Sigstore signature. Audited 2026-05-16 against
  # `node_modules/esbuild/install.js` @ v0.27.7.
  esbuild: true
  # bun — pulled in as a peer of `bun-plugin-tailwind` (the Tailwind v4
  # plugin for Bun's HTML bundler). The npm `bun` package is *only* installed
  # to satisfy that peer; at runtime everything uses the system bun on
  # PATH. The postinstall (`install.js`) loads the platform-specific binary
  # subpackage `@oven/bun-<platform>-<arch>` (already resolved by pnpm with
  # cooldown rules), or falls back to `registry.npmjs.org/@oven/<pkg>/-/<pkg>-1.3.13.tgz`
  # over HTTPS — same registry/trust boundary pnpm already enforces. Same
  # pattern as esbuild above. Without this, the system `bun` errors at
  # startup when it detects an incomplete `node_modules/bun` sibling.
  # Audited 2026-05-16 against
  # `node_modules/.pnpm/bun@1.3.13/node_modules/bun/install.js`.
  bun: true
  # msgpackr-extract — pulled in transitively by bunqueue (via msgpackr for
  # the queue's binary serialization). The install script is
  # `node-gyp-build-optional-packages`, which looks for a prebuilt binary in
  # platform-specific subpackages (e.g. `@msgpackr-extract/msgpackr-extract-darwin-arm64`)
  # already resolved by pnpm under the same cooldown + registry rules as
  # the parent. Falls back to a local node-gyp build from C++ source if no
  # platform prebuilt is found. Same trust pattern as esbuild/bun above.
  # msgpackr also has a pure-JS fallback if msgpackr-extract is absent;
  # allowing the build just buys the native accelerator. Audited 2026-05-20
  # against `node_modules/.pnpm/msgpackr-extract@3.0.3/node_modules/msgpackr-extract/package.json`.
  msgpackr-extract: true

# Reinforce the v11 default in case it ever changes upstream.
strictDepBuilds: true

# No transitive deps from git URLs or raw tarballs — registry only.
blockExoticSubdeps: true

# Fail install if a newer release has weaker publish-time trust than the prior one.
trustPolicy: no-downgrade

# Trust-policy exceptions — same bar as `overrides` / `auditConfig.ignoreGhsas`
# below: each entry needs a date + reason. trustPolicy STAYS no-downgrade; these
# are surgical per-package exemptions, not a relaxation of the policy.
#
# vite — VitePress's build engine. Dev-only: it powers `pnpm docs:build` and the
# `docs` dev server, and is never shipped in the Docker image (the prod stage
# installs `--prod`, which drops devDependencies). Trips no-downgrade because
# earlier vite releases carried npm "trusted publisher" evidence while current
# 5.4.x carry Sigstore "provenance attestation" only; pnpm ranks trusted-publisher
# above provenance and flags the transition as a downgrade. This is a benign
# ecosystem-wide shift in npm's attestation story (provenance is itself a strong
# signal, published by the vitejs org), not a takeover — verified 2026-06-19 that
# vite 5.4.0..5.4.21 all carry provenance attestation. Excluded by bare name (not
# version-pinned) because the shift is structural: every current vite trips it, so
# a version pin would only churn on each patch bump. Re-evaluate if vite ever
# regains trusted-publisher evidence. Added 2026-06-19.
trustPolicyExclude:
  - vite

# Re-verify node_modules matches the lockfile before any script runs.
verifyDepsBeforeRun: install

# Transitive-dep overrides. Each entry needs a date + reason — same bar as
# `allowBuilds` above. Keep the path as specific as possible so the override
# disappears the moment drizzle-kit (or the upstream chain) is fixed.
overrides:
  # GHSA-67mh-4wv8-2f99 — esbuild <=0.24.2 lets any website hit the dev server
  # via permissive CORS. drizzle-kit ships the deprecated `@esbuild-kit/*`
  # packages which pin esbuild 0.18.20. We only invoke drizzle-kit for
  # `db:generate` / `db:studio` (no dev-server exposure), so the practical risk
  # is nil — but `pnpm audit --audit-level=moderate` (supply-chain CI job)
  # rejects it. Pinning ^0.25.0 lines up with the already-resolved esbuild
  # 0.25.12 elsewhere in the tree, so this adds zero new versions. Remove this
  # entry once drizzle-kit drops `@esbuild-kit/*` for `tsx`. Added 2026-05-16.
  # (The newer GHSA-gv7w-rqvm-qjhr, esbuild <0.28.1, is handled via auditConfig
  # below rather than bumping this pin — see that note for why.)
  "@esbuild-kit/core-utils>esbuild": "^0.25.0"
  # GHSA-96hv-2xvq-fx4p — ws >=8.0.0 <8.21.0 has a memory-exhaustion DoS: a
  # peer sending many tiny fragments / data chunks forces unbounded buffering.
  # (Supersedes GHSA-58qx-3vcg-4xpx, the uninitialized-memory disclosure that
  # first prompted this pin — that one needed <8.20.1, this one needs <8.21.0.)
  # happy-dom@20.9.0 still depends on a vulnerable ws. ws is dev-only here
  # (happy-dom provides the DOM for client-side tests; we don't ship it in the
  # Docker image), but `pnpm audit --audit-level=moderate` blocks the merge
  # until the transitive is bumped. Pinning `happy-dom>ws` keeps the override
  # surgical — if any other transitive ever depends on ws, it keeps its own
  # resolution and we re-evaluate then. ws@8.21.0 was published 2026-05-22,
  # well past the 7-day cooldown (no minimumReleaseAgeExclude needed). Remove
  # once happy-dom ships a release that bumps ws. Updated 2026-06-16.
  "happy-dom>ws": "^8.21.0"
  # GHSA-q8mj-m7cp-5q26 — qs >=6.11.1 <=6.15.1 has a remotely triggerable DoS
  # via `qs.stringify` crashing with TypeError on null/undefined entries in
  # comma-format arrays when encodeValuesOnly is set. qs is pulled in
  # transitively via bunqueue>@modelcontextprotocol/sdk>express (and
  # body-parser, express-rate-limit) — all using express@5.2.1 which still
  # resolves qs@6.15.1. The MCP SDK is the embedded server bunqueue exposes;
  # we never call `qs.stringify` with the affected option set, so the
  # practical risk is nil — but `pnpm audit --audit-level=moderate` blocks
  # merge. Surgical pins on the express/body-parser parents so the override
  # disappears once the upstream chain bumps. qs@6.15.2 was published
  # 2026-05-16, past the 7-day cooldown. Remove once express ships a release
  # that bumps qs. Added 2026-05-24.
  "express>qs": "^6.15.2"
  "body-parser>qs": "^6.15.2"
  # GHSA-h67p-54hq-rp68 — js-yaml <=4.1.1 has a quadratic-complexity DoS in
  # YAML merge-key (`<<`) handling via repeated aliases. Pulled in transitively
  # via @commitlint/cli > @commitlint/load > cosmiconfig > js-yaml — a dev-only
  # commit-message linter that only ever parses our own config, never untrusted
  # YAML, so practical risk is nil — but `pnpm audit --audit-level=moderate`
  # blocks merge. Upstream never published the advisory's nominal 4.1.2; the
  # fix shipped in 4.2.0 (published 2026-05-31, past the 7-day cooldown), which
  # satisfies the advisory's >=4.1.2. Surgical pin on the cosmiconfig parent.
  # Remove once cosmiconfig bumps js-yaml. Added 2026-06-16.
  "cosmiconfig>js-yaml": "^4.2.0"
  # GHSA-j6c9-x7qj-28xf / GHSA-rv63-4mwf-qqc2 / GHSA-wgpf-jwqj-8h8p — hono
  # <4.12.25 has body-limit-middleware bypasses (Content-Length understated on
  # AWS Lambda) and a Lambda@Edge adapter that keeps only the last value of a
  # repeated request header. We pin hono@4.12.25 directly (package.json), but
  # bunqueue's embedded MCP server pulls a second, older copy: both
  # @modelcontextprotocol/sdk>hono and @modelcontextprotocol/sdk>
  # @hono/node-server>hono resolve 4.12.21. xray deploys on Bun.serve as a
  # single image, never AWS Lambda / Lambda@Edge, so neither advisory is
  # reachable here — but `pnpm audit --audit-level=moderate` (supply-chain CI)
  # blocks merge until the transitive copies are bumped. Surgical pins on the
  # MCP-SDK subtree so the override disappears once the SDK bumps its hono.
  # 4.12.25 was published 2026-06-09, past the 7-day cooldown (no
  # minimumReleaseAgeExclude needed). Remove once @modelcontextprotocol/sdk
  # ships a release on hono >=4.12.25. Added 2026-06-17.
  "@modelcontextprotocol/sdk>hono": "^4.12.25"
  "@hono/node-server>hono": "^4.12.25"

# VEX-style "not affected" disposition: GHSA-gv7w-rqvm-qjhr is unreachable in
# this repo, so the audit gate is told to skip that one advisory — we do NOT
# relax the 7-day cooldown to pull the fix. The advisory is in esbuild's *Deno*
# installer (`lib/deno/mod.ts`), which fetches the native binary with no SHA-256
# check. We never invoke esbuild via Deno: it's a dev-only drizzle-kit
# transitive, installed through the *Node* path (`lib/npm/node-install.ts`),
# which hardcodes registry.npmjs.org (it does NOT read NPM_CONFIG_REGISTRY) and
# SHA-256-checks the binary before exec. The vulnerable code path does not run
# here.
#
# Why ignore instead of bumping to the patched esbuild 0.28.1: that release was
# published 2026-06-11 (<7 days old), so pinning it would force a cooldown
# bypass. Bypassing would pull a fresh release of a build tool that runs a
# native-binary postinstall and executes at build time with full filesystem /
# CI access — the exact high-blast-radius supply-chain risk the cooldown exists
# to contain (cf. the active June 2026 "Miasma" npm worm). Provenance/signatures
# do NOT rule that out ("attestations can't block a pipeline hijack"). Taking
# that risk to remediate a finding that cannot reach us is the wrong trade when
# the cooldown clears on its own in ~2 days. So: once 0.28.1 ages past the
# cooldown (after ~2026-06-18), bump esbuild to ^0.28.1 in `overrides` above and
# delete this ignore — fix landed, zero cooldown bypass. Added 2026-06-16.
auditConfig:
  ignoreGhsas:
    - GHSA-gv7w-rqvm-qjhr
    # ---- VitePress docs toolchain — dev-only, static-output VEX --------------
    # The advisories below all live in the docs-site toolchain (added with the
    # VitePress docs PR). They share one disposition: NOT AFFECTED.
    #   • Dev-only — vitepress/vite/esbuild/mermaid are devDependencies. The prod
    #     image installs `--prod` (Dockerfile stage 1), which drops them; none of
    #     this code ships in the container.
    #   • Static output — `pnpm docs:build` emits static HTML to GitHub Pages. The
    #     deployed site runs no vite/esbuild dev server, so the dev-server classes
    #     below have zero production surface.
    # We do NOT bump to remediate the vite findings: they're patched only in vite
    # 6.x, but vitepress@1.6.4 pins vite 5.x (no 5.x backport) — forcing vite 6
    # would break the pinned vitepress. Revisit when vitepress ships a stable
    # release on vite 6 (its 2.x line).
    #
    # GHSA-fx2h-pf6j-xcff (HIGH) — vite `server.fs.deny` bypass via Windows
    # alternate paths. Dev-server-only AND Windows-only; we build on macOS/Linux
    # and deploy static. Unreachable. Added 2026-06-21.
    - GHSA-fx2h-pf6j-xcff
    # GHSA-4w7w-66w2-5vf9 (moderate) — vite path traversal in optimized-deps
    # `.map` handling. Dev-server-only; absent from the static build. 2026-06-21.
    - GHSA-4w7w-66w2-5vf9
    # GHSA-v6wh-96g9-6wx3 (moderate) — launch-editor (vite dev-server "open in
    # editor") NTLMv2 hash disclosure via UNC paths on Windows. Dev-server-only,
    # Windows-only. Unreachable here. Added 2026-06-21.
    - GHSA-v6wh-96g9-6wx3
    # GHSA-67mh-4wv8-2f99 (moderate) — esbuild dev server lets any site read
    # responses (permissive CORS). Same advisory the `overrides` above patch for
    # the drizzle-kit path; here it rides in via vitepress>vite>esbuild (0.21.5,
    # which vite 5.4 pins). esbuild is vite's transform library, never run via its
    # `serve` mode, and the docs deploy is static — the dev server never runs.
    # Bumping vite's esbuild to 0.25 risks breaking vite 5.4's build, so ignore
    # rather than override. Added 2026-06-21.
    - GHSA-67mh-4wv8-2f99
    # GHSA-cmwh-pvxp-8882 (moderate) — DOMPurify ALLOWED_ATTR pollution via
    # setConfig(). Rides in via mermaid>dompurify; mermaid sanitizes the diagrams
    # WE author at build time, never untrusted input, and we never call setConfig
    # with attacker-controlled config — unreachable. The fix (dompurify 3.4.11,
    # published 2026-06-17) is still inside the 7-day cooldown and the finding is
    # not urgent, so we don't bypass it. Convert to `overrides: mermaid>dompurify:
    # ^3.4.11` once 3.4.11 clears cooldown (~2026-06-24). Added 2026-06-21.
    - GHSA-cmwh-pvxp-8882
