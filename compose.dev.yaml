# Development compose — single Bun container serving the React SPA (via Bun's
# HTML bundler) and the Hono API on :8080. `bun --hot` rebuilds the bundle on
# file change and reloads the server when src/server/* changes.
#
# `pnpm dev` wraps this. The dev image bakes pnpm and bun at build time as root
# so the running container can drop to the host user without needing
# privileges to `corepack enable` at runtime.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev.server
      args:
        UID: "${UID:-1000}"
        GID: "${GID:-1000}"
    # Container name is parameterized so parallel worktrees don't collide on
    # the Docker engine's global name table. `pnpm dev` from the main checkout
    # keeps the default `xray-dev`; a sibling worktree sets COMPOSE_PROJECT_NAME
    # in its own `.env` (see scripts/new-worktree.sh). The named volumes below
    # are auto-namespaced by COMPOSE_PROJECT_NAME too, so each worktree gets its
    # own SQLite + node_modules without any extra config.
    container_name: ${COMPOSE_PROJECT_NAME:-xray}-dev
    # Run as the host user so anything pnpm writes into the bind-mounted repo
    # is owned by the developer, not root. A compromised dev dep can no longer
    # rewrite .git/hooks or stage commits via root-write to /app.
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /app
    # `bun install` would trip the `only-allow pnpm` preinstall guard. Bun runs
    # the server (`bun --hot src/server/main.ts`), but pnpm owns dep resolution
    # so the lockfile stays single-source-of-truth.
    #
    # HOME/PNPM_HOME point at writable paths because the host UID has no
    # /etc/passwd entry inside the container, so $HOME would otherwise be `/`.
    environment:
      - HOME=/tmp
      - PNPM_HOME=/tmp/pnpm
      - HOST=0.0.0.0
      - PORT=8080
    env_file:
      - .env
    # `--ignore-scripts` skips the root project's `prepare` lifecycle script
    # (which runs `lefthook install`). lefthook is a host-only concern — git
    # hooks fire on the developer's host git ops, never inside the container.
    # Also: in a worktree, the bind-mounted `.git` is a pointer file referencing
    # `<main-repo>/.git/worktrees/<name>` on the host, which isn't mounted here,
    # so `lefthook install` would crash with "not a git repository". Host-side
    # `pnpm install` (e.g. via scripts/new-worktree.sh) still runs the prepare
    # script and wires the hooks where they belong.
    command: sh -c "pnpm install --frozen-lockfile --ignore-scripts && bun --hot src/server/main.ts"
    volumes:
      - ./:/app
      - dev_node_modules:/app/node_modules
      # XRAY_DATA_DIR=/data per .env; the SQLite file lives in a named volume
      # so replays persist across `pnpm dev` restarts. `pnpm dev:down -v` wipes
      # it. The image pre-creates /data with the dev UID's ownership (see
      # Dockerfile.dev.server) so this volume isn't root-owned on first mount.
      - dev_data:/data
    # Host-side port is parameterized for the same parallel-worktree reason as
    # container_name above. Container's internal port stays 8080 — only the
    # mapping to the host varies (HOST_PORT in the worktree's .env).
    ports:
      - "${HOST_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 24
      start_period: 60s

volumes:
  dev_node_modules:
  dev_data:
