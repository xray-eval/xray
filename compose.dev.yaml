# Development compose — single Bun container serving the React SPA (via Bun's
# HTML bundler) and the Hono API on :8080. `bun --hot` rebuilds the bundle on
# file change and reloads the server when src/server/* changes.
#
# `pnpm dev` wraps this. The dev image bakes pnpm and bun at build time as root
# so the running container can drop to the host user without needing
# privileges to `corepack enable` at runtime.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev.server
      args:
        UID: "${UID:-1000}"
        GID: "${GID:-1000}"
    container_name: xray-dev
    # Run as the host user so anything pnpm writes into the bind-mounted repo
    # is owned by the developer, not root. A compromised dev dep can no longer
    # rewrite .git/hooks or stage commits via root-write to /app.
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /app
    # `bun install` would trip the `only-allow pnpm` preinstall guard. Bun runs
    # the server (`bun --hot src/server/main.ts`), but pnpm owns dep resolution
    # so the lockfile stays single-source-of-truth.
    #
    # HOME/PNPM_HOME point at writable paths because the host UID has no
    # /etc/passwd entry inside the container, so $HOME would otherwise be `/`.
    environment:
      - HOME=/tmp
      - PNPM_HOME=/tmp/pnpm
      - HOST=0.0.0.0
      - PORT=8080
    env_file:
      - .env
    command: sh -c "pnpm install --frozen-lockfile && bun --hot src/server/main.ts"
    volumes:
      - ./:/app
      - dev_node_modules:/app/node_modules
      # XRAY_DATA_DIR=/data per .env; the SQLite file lives in a named volume
      # so sessions persist across `pnpm dev` restarts. `pnpm dev:down -v`
      # wipes it. The image pre-creates /data with the dev UID's ownership
      # (see Dockerfile.dev.server) so this volume isn't root-owned on first
      # mount.
      - dev_data:/data
    ports:
      - "8080:8080"
    # Used by the `agent-webhook` profile below: that service depends on `app`
    # being healthy before it boots, which is how we serialize the initial
    # `pnpm install` write to the shared `dev_node_modules` volume (the app
    # service installs once, the webhook service then finds node_modules
    # already populated and skips its own install).
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 24
      start_period: 60s

  # FOR XRAY CONTRIBUTORS ONLY — not a feature of xray itself.
  #
  # Throwaway sibling service that acts as an OpenAI-backed test webhook for
  # agent replay, used by contributors hacking on this repo to smoke-test
  # replay-related changes end-to-end. Real xray users already have their own
  # agent loop and never run this. See scripts/agent-webhook.ts for the why.
  #
  # Opt-in via the `webhook` compose profile so the default `pnpm dev` doesn't
  # need an OPENAI_API_KEY. Brought up by `pnpm dev:webhook`.
  #
  # Reuses Dockerfile.dev.server: the cost of running a 100-line script in the
  # dev image is zero in dev, and it saves us maintaining a second pinned base
  # digest.
  #
  # Reachable from xray-dev at `http://agent-webhook:4000/replay` (Docker
  # network DNS). Port 4000 is also exposed to the host so you can curl
  # /healthz to debug.
  agent-webhook:
    profiles: ["webhook"]
    build:
      context: .
      dockerfile: Dockerfile.dev.server
      args:
        UID: "${UID:-1000}"
        GID: "${GID:-1000}"
    container_name: xray-agent-webhook
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /app
    depends_on:
      app:
        condition: service_healthy
    environment:
      - HOME=/tmp
      - PNPM_HOME=/tmp/pnpm
      - PORT=4000
    env_file:
      - .env
    command: bun scripts/agent-webhook.ts
    volumes:
      - ./:/app
      - dev_node_modules:/app/node_modules
    # No `ports:` mapping on purpose — exposing this OPENAI_API_KEY-burning
    # service to the host's LAN is a money/abuse risk. xray-dev reaches us via
    # Docker network DNS (http://agent-webhook:4000).
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 6
      start_period: 10s

volumes:
  dev_node_modules:
  dev_data:
